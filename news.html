  <script id="news-jsonld" type="application/ld+json">{"@context":"https://schema.org","@type":"Blog","name":"お知らせ | UMEZOO株式会社","url":"https://umezoo.co.jp/news.html","description":"UMEZOO株式会社からのお知らせ・最新情報。","publisher":{"@type":"Organization","name":"UMEZOO株式会社","url":"https://umezoo.co.jp/","logo":{"@type":"ImageObject","url":"https://umezoo.co.jp/umezoo_logo_yoko_color.jpg"}},"blogPost":[{"@type":"BlogPosting","headline":"UMEZOO株式会社を設立しました","datePublished":"2024-03-15","dateModified":"2024-03-15","image":"https://umezoo.co.jp/images/news/company-founding.jpg","author":{"@type":"Organization","name":"UMEZOO株式会社","url":"https://umezoo.co.jp/"},"publisher":{"@type":"Organization","name":"UMEZOO株式会社","url":"https://umezoo.co.jp/","logo":{"@type":"ImageObject","url":"https://umezoo.co.jp/umezoo_logo_yoko_color.jpg"}},"description":"フードクリエイティブファームとして、UMEZOO株式会社を設立いたしました。創造的な食体験を事業活動に浸透させることをミッションに掲げ、活動を開始いたします。","articleBody":"2024年3月15日、UMEZOO株式会社を設立いたしました。 UMEZOOは「創造的な食体験を、事業活動に浸透させる」をミッションに掲げるフードクリエイティブファームです。フードビジネスディレクションとコンテンツデリバリーを軸に、商品、店舗、製造施設、SNS、映像、BGM、Web、空間演出、内装デザインなど、お客様に提供するあらゆる食体験を、クリエイティビティで特別なものに昇華することを生業としております。 代表を務める梅津信吾は、フランス留学中に料理人としてのキャリアをスタートし、国内外の名店で研鑽を積んできました。2021年には国内最大級のシェフコンペティション「RED U-35」にてシルバーエッグを受賞。料理の技術だけでなく、食を取り巻く体験すべてをクリエイティブの視点で捉え直すことの重要性を感じ、この度の会社設立に至りました。 「食べる」という行為を超えて、記憶に残る食体験をデザインすることをミッションに掲げ、フードビジネスの新しい可能性を追求してまいります。 今後ともUMEZOOをよろしくお願いいたします。","keywords":["プレスリリース"],"mainEntityOfPage":{"@type":"WebPage","@id":"https://umezoo.co.jp/news.html"}},{"@type":"BlogPosting","headline":"公式ウェブサイトを公開しました","datePublished":"2024-03-20","dateModified":"2024-03-20","image":"https://umezoo.co.jp/images/news/website-launch.jpg","author":{"@type":"Organization","name":"UMEZOO株式会社","url":"https://umezoo.co.jp/"},"publisher":{"@type":"Organization","name":"UMEZOO株式会社","url":"https://umezoo.co.jp/","logo":{"@type":"ImageObject","url":"https://umezoo.co.jp/umezoo_logo_yoko_color.jpg"}},"description":"UMEZOOの公式ウェブサイトを公開いたしました。私たちのサービス、実績、そしてフードクリエイティブに対する想いをご覧いただけます。","articleBody":"本日、UMEZOO株式会社の公式ウェブサイトを公開いたしました。 当サイトでは、UMEZOOが提供するサービスの詳細、これまでの実績、そして私たちが大切にしている価値観をご覧いただけます。 ウェブサイトのコンテンツ ・About：UMEZOOの理念と代表・梅津信吾のプロフィール ・Work：高畠ワイナリー、YAMAGATA FUSION、三井不動産&mogなど、これまでの実績 ・Service：フードビジネスディレクション、コンテンツデリバリー、クリエイティブデザインなどのサービス紹介 ・Career：採用情報 ・News：最新のお知らせ ・Contact：お問い合わせフォーム 多言語対応（日本語・英語・フランス語）にも対応しており、海外のお客様にもUMEZOOの活動をお伝えできるようになっております。 プロジェクトのご相談、業務提携のお問い合わせなど、お気軽にご連絡ください。","keywords":["お知らせ"],"mainEntityOfPage":{"@type":"WebPage","@id":"https://umezoo.co.jp/news.html"}},{"@type":"BlogPosting","headline":"代表・梅津信吾が語る「食とクリエイティブの未来」","datePublished":"2024-03-25","dateModified":"2024-03-25","image":"https://umezoo.co.jp/images/news/founder-message.jpg","author":{"@type":"Organization","name":"UMEZOO株式会社","url":"https://umezoo.co.jp/"},"publisher":{"@type":"Organization","name":"UMEZOO株式会社","url":"https://umezoo.co.jp/","logo":{"@type":"ImageObject","url":"https://umezoo.co.jp/umezoo_logo_yoko_color.jpg"}},"description":"RED U-35シルバーエッグ受賞シェフである代表・梅津信吾が、UMEZOO設立の背景と、フードクリエイティブが切り拓く新しい食体験について語ります。","articleBody":"UMEZOO株式会社の設立にあたり、代表・梅津信吾が会社設立の背景と、フードクリエイティブが切り拓く新しい食体験について語りました。 なぜフードクリエイティブファームを立ち上げたのか 「料理人として様々な経験を積む中で、食の価値は\"味\"だけではないと強く感じるようになりました。お皿に盛られた料理だけでなく、空間、音楽、サービス、そしてストーリー。これらすべてが一体となって初めて、人の心に残る食体験が生まれます。 UMEZOOは、この\"食体験全体\"をデザインする会社です。レシピ開発や店舗プロデュースはもちろん、映像制作やBGM、Webサイト、SNSコンテンツまで、食に関わるあらゆるクリエイティブを一貫して手がけます。」 大切にしている価値観 「私たちが大切にしているのは、Creativity（創造性）、Seamless（シームレスな連携）、Fairness（公正さ）、Impact（成果）の4つです。特にFairnessは、生産者から消費者まで、食に関わるすべての人に対してフェアで共創的であることを意味しています。 食は人々の暮らしに深く根ざしたものです。だからこそ、ビジネスとして成功するだけでなく、関わるすべての人が幸せになれる形を追求したいと考えています。」 今後の展望 「UMEZOOとして、食の可能性をさらに広げていきたいと考えています。国内だけでなく海外の案件にも積極的に取り組み、日本の食文化の素晴らしさを世界に発信していく。そんな架け橋になれたら嬉しいです。」","keywords":["Journey"],"mainEntityOfPage":{"@type":"WebPage","@id":"https://umezoo.co.jp/news.html"}},{"@type":"BlogPosting","headline":"「YAMAGATA FUSION」を開催しました","datePublished":"2024-09-14","dateModified":"2024-09-14","image":"https://umezoo.co.jp/images/work/yamagata-fusion.jpg","author":{"@type":"Organization","name":"UMEZOO株式会社","url":"https://umezoo.co.jp/"},"publisher":{"@type":"Organization","name":"UMEZOO株式会社","url":"https://umezoo.co.jp/","logo":{"@type":"ImageObject","url":"https://umezoo.co.jp/umezoo_logo_yoko_color.jpg"}},"description":"東京にて、山形の料理とワインによる新たな食体験を発信するコラボイベント「YAMAGATA FUSION」を開催。高畠ワイナリー協力のもと実現しました。","articleBody":"2024年9月14日、東京にて「YAMAGATA FUSION」を開催いたしました。 本イベントは、山形県が誇る食材とワインを融合させた新たな食体験を発信するコラボイベントです。高畠ワイナリー様のご協力のもと、CLUB REDメンバーとして企画・運営を担当させていただきました。 イベント概要 ・日時：2024年9月14日（土） ・会場：東京都内 ・内容：山形の食材を活かしたコース料理と高畠ワインのペアリング体験 山形の食材とワインの融合 山形県は、米沢牛、だだちゃ豆、ラ・フランスなど豊かな食材の宝庫です。また、高畠ワイナリーは日本を代表するワイナリーの一つとして知られています。 今回のイベントでは、山形から届いた旬の食材を活かした創作料理と、それに合わせた高畠ワインのペアリングを提案。東京にいながら山形の「テロワール」を五感で体験していただきました。 ご参加いただいた皆様、そしてご協力いただいた高畠ワイナリーの皆様に、心より感謝申し上げます。 イベントレポートはこちら →","keywords":["プロジェクト"],"mainEntityOfPage":{"@type":"WebPage","@id":"https://umezoo.co.jp/news.html"}},{"@type":"BlogPosting","headline":"三井不動産「&mog」にてワークショップを共催","datePublished":"2024-05-10","dateModified":"2024-05-10","image":"https://umezoo.co.jp/images/work/andmog.jpg","author":{"@type":"Organization","name":"UMEZOO株式会社","url":"https://umezoo.co.jp/"},"publisher":{"@type":"Organization","name":"UMEZOO株式会社","url":"https://umezoo.co.jp/","logo":{"@type":"ImageObject","url":"https://umezoo.co.jp/umezoo_logo_yoko_color.jpg"}},"description":"三井不動産様の飲食事業者共創プラットフォーム「&mog」にて、消費者向け食品プロモーションにおけるクリエイティブ制作ワークショップを共催しました。","articleBody":"2024年5月、三井不動産様が運営する飲食事業者の共創プラットフォーム「&mog（アンドモグ）」にて、クリエイティブ制作ワークショップを共催いたしました。 &mogとは &mogは、三井不動産様が展開する飲食事業者向けの共創プラットフォームです。飲食店経営者、食品メーカー、クリエイターなど、食に関わる様々なプレイヤーが集い、新しいビジネスの創出を目指しています。 ワークショップの内容 今回のワークショップでは、消費者向け食品のプロモーションにおけるクリエイティブ制作をテーマに、以下の内容を実施しました： ・食品ブランディングの基礎 ・SNSコンテンツの企画・制作手法 ・写真・動画撮影のポイント ・効果的なストーリーテリング 参加者との共創 参加いただいた飲食事業者の皆様と共に、各社の商品やサービスをより魅力的に伝えるためのクリエイティブアイデアを議論。実践的なワークを通じて、すぐに活用できるスキルとナレッジを共有しました。 UMEZOOは今後も、食に関わる事業者の皆様とのコラボレーションを通じて、フードビジネスの発展に貢献してまいります。 詳細資料はこちら →","keywords":["プロジェクト"],"mainEntityOfPage":{"@type":"WebPage","@id":"https://umezoo.co.jp/news.html"}},{"@type":"BlogPosting","headline":"福島県大熊町「Fun Eat Makers」プロジェクトに参画","datePublished":"2024-12-01","dateModified":"2024-12-01","image":"https://umezoo.co.jp/images/work/fun-eat-makers.jpg","author":{"@type":"Organization","name":"UMEZOO株式会社","url":"https://umezoo.co.jp/"},"publisher":{"@type":"Organization","name":"UMEZOO株式会社","url":"https://umezoo.co.jp/","logo":{"@type":"ImageObject","url":"https://umezoo.co.jp/umezoo_logo_yoko_color.jpg"}},"description":"福島県大熊町の農業再生プロジェクト「Fun Eat Makers in Okuma」に参画。「つくる・たべる・つながる」をコンセプトに農業と食の拠点創出に取り組んでいます。2025年6月ローンチ予定。","articleBody":"UMEZOOは、福島県大熊町で進行中の農業再生プロジェクト「Fun Eat Makers in Okuma」に参画しております。 2025年6月ローンチ予定 です。 プロジェクトの背景 福島県大熊町は、東日本大震災および原発事故からの復興を進める中で、新たな産業の創出と地域の活性化に取り組んでいます。「Fun Eat Makers」は、農業と食を軸にした復興プロジェクトとして、地域に新しい価値を生み出すことを目指しています。 「つくる・たべる・つながる」 本プロジェクトは「つくる・たべる・つながる」をコンセプトに掲げ、以下の取り組みを推進しています： ・ つくる ：地元での農産物生産の再開と新しい栽培技術の導入 ・ たべる ：地元食材を活かした料理開発と食体験の提供 ・ つながる ：生産者・料理人・消費者をつなぐコミュニティの形成 UMEZOOの役割 UMEZOOは本プロジェクトにおいて、食体験のクリエイティブディレクションを担当。地元で生産された食材を活用したメニュー開発、イベント企画、情報発信などを通じて、大熊町の食の魅力を広く伝える活動を行っています。 食を通じた地域復興に、クリエイティブの力で貢献してまいります。 プロジェクト詳細はこちら →","keywords":["プロジェクト"],"mainEntityOfPage":{"@type":"WebPage","@id":"https://umezoo.co.jp/news.html"}}]}</script>
